<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NoteFlow — A lightweight, offline-first, browser-based personal workspace for easy note-taking. No logins, no servers, just flow.">
  <title>NoteFlow — Personal Workspace</title>
  
  <!-- Font and Icon Assets -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div class="app-container">
    
    <!-- SIDEBAR PANEL -->
    <aside class="sidebar">
      <div class="sidebar__header">
        <div class="sidebar__header-top">
          <h1 class="sidebar__title">NoteFlow</h1>
          <button id="new-note-btn" class="btn btn--primary" title="Create a new note">
            <span class="material-symbols-outlined">add</span>
            New Note
          </button>
        </div>
        
        <!-- Search bar -->
        <div class="search-wrapper">
          <span class="material-symbols-outlined search-wrapper__icon">search</span>
          <input type="text" class="search-input" placeholder="Search notes..." aria-label="Search notes">
        </div>
        
        <!-- Sort bar -->
        <div class="sort-control">
          <span class="sort-control__label">Recent Notes</span>
          <select class="sort-select" aria-label="Sort notes preference">
            <option value="recent">Sort by: Last Edited</option>
            <option value="created">Sort by: Date Created</option>
            <option value="title">Sort by: Title (A-Z)</option>
            <option value="manual">Sort by: Custom Order</option>
          </select>
        </div>
      </div>
      
      <!-- Notes list scroll area -->
      <div class="sidebar__notes-list custom-scrollbar">
        <!-- Rendered dynamically by ui.js -->
      </div>
      
      <!-- Sidebar footer -->
      <footer class="sidebar__footer">
        <button id="sidebar-settings-btn" class="btn btn--secondary" style="width: 100%; justify-content: flex-start; gap: var(--spacing-sm);" title="Workspace settings">
          <span class="material-symbols-outlined">settings</span>
          Workspace Settings
        </button>
      </footer>
    </aside>

    <!-- MAIN EDITOR PANEL -->
    <main class="editor-panel">
      
      <!-- Top header bar -->
      <header class="editor-panel__header">
        <div class="editor-panel__breadcrumbs-wrapper" style="display: flex; align-items: center; gap: var(--spacing-sm);">
          <button class="back-button" title="Back to notes list">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <div class="divider back-button" style="height: 16px;"></div>
          <nav class="editor-panel__breadcrumbs" aria-label="Breadcrumb">
            <span>Notes</span>
            <span class="material-symbols-outlined" style="font-size: 16px;">chevron_right</span>
            <span class="active">Active Note</span>
          </nav>
        </div>
        
        <div class="editor-panel__actions">
          <button id="topbar-pin-btn" class="btn btn--secondary btn--icon-text" title="Pin note to the top">
            <span class="material-symbols-outlined">push_pin</span>
            <span class="font-label-sm">Pin</span>
          </button>
          <div class="divider"></div>
          <button id="topbar-share-btn" class="btn--icon" title="Share note">
            <span class="material-symbols-outlined">share</span>
          </button>
          <button id="topbar-delete-btn" class="btn--icon btn--icon-danger" title="Delete note">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <div class="dropdown-wrapper">
            <button id="topbar-more-btn" class="btn--icon" title="More options">
              <span class="material-symbols-outlined">more_vert</span>
            </button>
            <div id="more-options-menu" class="dropdown-menu">
              <button class="dropdown-menu__item" data-action="duplicate">
                <span class="material-symbols-outlined">content_copy</span>
                Duplicate Note
              </button>
              <button class="dropdown-menu__item" data-action="export">
                <span class="material-symbols-outlined">download</span>
                Export as Text
              </button>
              <div class="dropdown-menu__divider"></div>
              <button class="dropdown-menu__item" data-action="copy">
                <span class="material-symbols-outlined">assignment</span>
                Copy to Clipboard
              </button>
            </div>
          </div>
        </div>
      </header>
      
      <!-- Active workspace editor -->
      <div class="editor-panel__scroll-area custom-scrollbar">
        <!-- Rendered dynamically by ui.js -->
      </div>
      
      <!-- Bottom status bar -->
      <footer class="editor-panel__footer">
        <div class="editor-panel__footer-left">
          <span id="note-stats-info">Last saved: Today at 10:45 AM | 0 words</span>
        </div>
        
        <div class="editor-panel__footer-right">
          <button class="btn--icon" style="font-size: 12px; padding: 2px 4px;" title="Help">Help</button>
          <button class="btn--icon" style="font-size: 12px; padding: 2px 4px;" title="Shortcuts">Shortcuts</button>
          <div class="flex items-center gap-xs" style="display: inline-flex; align-items: center; gap: var(--spacing-xs); color: var(--primary);">
            <span class="material-symbols-outlined" style="font-size: 16px;">cloud_done</span>
            <span>Local Storage</span>
          </div>
        </div>
      </footer>
    </main>

  </div>

  <!-- DELETE CONFIRMATION MODAL OVERLAY -->
  <div class="modal-overlay">
    <div class="modal-card" role="dialog" aria-labelledby="modal-title" aria-describedby="modal-body">
      <div class="modal-card__header">
        <span class="material-symbols-outlined modal-card__icon-warning">warning</span>
        <h2 id="modal-title" class="modal-card__title">Delete Note</h2>
      </div>
      <p id="modal-body" class="modal-card__body">Are you sure you want to delete this note? This action cannot be undone.</p>
      <div class="modal-card__actions">
        <button id="delete-cancel-btn" class="btn btn--secondary">Cancel</button>
        <button id="delete-confirm-btn" class="btn btn--danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION CONTAINER -->
  <div class="toast-container">
    <div class="toast" role="status" aria-live="polite">
      <span class="toast__message">Note deleted</span>
      <div class="toast__actions">
        <button class="toast__undo-btn">Undo</button>
        <div class="toast__divider"></div>
        <button class="toast__close-btn" title="Dismiss" aria-label="Dismiss notification">
          <span class="material-symbols-outlined" style="font-size: 16px;">close</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Main scripts -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
