<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {

        theme: {
          extend: {
            "colors": {

                    "inverse-on-surface": "#f0f1f2",
                    "surface-variant": "#e1e3e4",
                    "surface-bright": "#f8f9fa",
                    "inverse-primary": "#c3c0ff",
                    "on-background": "#191c1d",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "outline-variant": "#c7c4d8",
                    "primary-fixed-dim": "#c3c0ff",
                    "on-secondary": "#ffffff",
                    "secondary": "#006c49",
                    "tertiary-fixed": "#ffdadb",
                    "on-tertiary-container": "#ffd0d2",
                    "secondary-container": "#6cf8bb",
                    "background": "#f8f9fa",
                    "tertiary-container": "#bf0f3c",
                    "surface": "#f8f9fa",
                    "primary-fixed": "#e2dfff",
                    "on-surface": "#191c1d",
                    "error": "#ba1a1a",
                    "surface-tint": "#4d44e3",
                    "secondary-fixed-dim": "#4edea3",
                    "on-secondary-fixed-variant": "#005236",
                    "surface-container": "#edeeef",
                    "outline": "#777587",
                    "surface-dim": "#d9dadb",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#002113",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f3f4f5",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#6ffbbe",
                    "primary-container": "#4f46e5",
                    "on-secondary-container": "#00714d",
                    "on-primary-fixed": "#0f0069",
                    "on-tertiary-fixed": "#40000d",
                    "surface-container-highest": "#e1e3e4",
                    "surface-container-high": "#e7e8e9",
                    "on-tertiary-fixed-variant": "#92002a",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#ffb2b7",
                    "on-primary-container": "#dad7ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "sm": "8px",
                    "gutter": "24px",
                    "md": "16px",
                    "container-max": "1280px",
                    "xl": "40px",
                    "lg": "24px",
                    "base": "4px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "headline-lg": ["Geist"],
                    "label-sm": ["Geist"],
                    "body-sm": ["Geist"],
                    "display": ["Geist"],
                    "body-md": ["Geist"],
                    "headline-lg-mobile": ["Geist"],

                    "body-lg": ["Geist"],
                    "label-md": ["Geist"]
            },

        },

<style>
        body { font-family: 'Geist', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .flat-tactile-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
        }
        .ios-safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        textarea:focus, input:focus {
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-md h-16 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-sm">
<button class="flex items-center text-primary hover:bg-surface-variant transition-colors rounded-full p-2 active:scale-95 duration-100">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-label-md text-label-md ml-1">Notes</span>
</button>
</div>
<div class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center">
<span class="font-label-sm text-label-sm text-outline">Auto-saved</span>
</div>
<div class="flex items-center gap-xs">
<button class="p-2 text-secondary hover:bg-secondary-container/20 rounded-full transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">push_pin</span>
</button>
<button class="p-2 text-error hover:bg-error-container/20 rounded-full transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</header>
<!-- Main Editor Canvas -->
<main class="pt-20 px-md pb-32 min-h-screen">
<div class="max-w-container-max mx-auto">
<!-- Title Input -->
<input class="w-full bg-transparent border-none p-0 mb-4 font-headline-md text-headline-md text-on-surface focus:ring-0 placeholder:text-outline-variant" placeholder="Title" type="text" value="Strategic Project Roadmap 2024"/>
<!-- Subtle Divider -->
<div class="h-[1px] w-full bg-outline-variant/30 mb-6"></div>
<!-- Body Editor -->
<textarea class="w-full bg-transparent border-none p-0 font-body-md text-body-md text-on-surface-variant leading-relaxed focus:ring-0 resize-none min-h-[530px] placeholder:text-outline-variant" placeholder="Start writing...">Scaling the design system is our primary focus for Q1. We need to ensure that the flat-tactile feedback loops are consistent across all mobile components. 

The goal is high-utility modernism: reducing visual noise while maintaining clear structural hierarchies. 

Key milestones:
1. Audit current token architecture
2. Implement 8px grid strictness
3. Refresh Indigo accent palette for better accessibility
4. User testing on 'Auto-save' visual cues

We want the interface to recede, making the user's content the primary hero of every screen.</textarea>
</div>
</main>
<!-- Floating Keyboard Toolbar -->
<div class="fixed bottom-6 left-md right-md z-50">
<div class="max-w-[400px] mx-auto bg-surface-container-highest/95 backdrop-blur-md border border-outline-variant rounded-full h-14 px-md flex items-center justify-between shadow-sm">
<div class="flex items-center">
<span class="text-label-sm font-label-sm text-on-surface-variant px-2">342 words</span>
</div>
<div class="flex items-center gap-sm">
<button class="p-2 text-on-surface-variant hover:bg-surface-variant rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-surface-variant rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined">redo</span>
</button>
<div class="w-[1px] h-6 bg-outline-variant mx-1"></div>
<button class="p-2 text-primary hover:bg-primary-container/10 rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined">format_list_bulleted</span>
</button>
<button class="p-2 text-primary hover:bg-primary-container/10 rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined">text_fields</span>
</button>
</div>
</div>
<div class="h-safe-area-bottom"></div>
</div>
<!-- Decorative Subtle Background Pattern (Non-image) -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(#3525cd 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
<script>
        // Simple micro-interactions
        const textarea = document.querySelector('textarea');
        const wordCountDisplay = document.querySelector('.text-label-sm');

        textarea.addEventListener('input', (e) => {
            const text = e.target.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            wordCountDisplay.textContent = `${words} words`;
        });

        // Mimic auto-save pulse
        setInterval(() => {
            const autoSave = document.querySelector('.text-outline');
            autoSave.style.transition = 'opacity 1s';
            autoSave.style.opacity = '0.5';
            setTimeout(() => {
                autoSave.style.opacity = '1';
                autoSave.textContent = 'Auto-saved';
            }, 1000);
        }, 30000);
    </script>
</body></html>
